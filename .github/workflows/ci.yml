name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: this workflow only needs to read the repo. Fork PRs get a
# read-only token and no secrets (never switch to pull_request_target here).
permissions:
  contents: read

jobs:
  test:
    name: lint + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      # Actions pinned to full commit SHAs (mutable tags are a supply-chain risk).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # Fail the build if a dependency develops a high/critical advisory.
      - run: npm audit --audit-level=high
