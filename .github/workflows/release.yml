name: Release

# Publishes to npm with provenance when a v* tag is pushed. Publishing from CI
# via OIDC (npm "trusted publishing") binds the tarball to this commit/tag and
# removes the need for a long-lived npm token on a laptop.
#
# One-time setup on npmjs.com: configure @kirkelabs/oaa-agent-kit as a trusted
# publisher for this repo + workflow, and require 2FA on the account.

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for npm provenance / OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # prepublishOnly re-runs lint+test; --provenance attests tarball -> commit.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
